# TiShift OceanBase — Configuration

source:
  host: ob-cluster.example.com
  port: 2881                      # OBProxy port (not 3306)
  user: tishift_readonly
  tenant: sys                     # OceanBase tenant name
  password: ${TISHIFT_OB_PASSWORD}
  database: myapp
  mode: auto                      # auto | mysql | oracle

target:
  host: gateway01.us-east-1.prod.aws.tidbcloud.com
  port: 4000
  user: root
  password: ${TISHIFT_TARGET_PASSWORD}
  database: myapp
  tls: true
  tier: starter

ai:
  provider: none    # openai or none
  api_key: ${TISHIFT_AI_API_KEY}
  model: ""         # e.g., gpt-4o

output:
  dir: ./tishift-reports
  formats: [cli, json, html]

logging:
  level: info
  file: tishift-ob.log

metrics:
  enabled: false
  port: 9090
